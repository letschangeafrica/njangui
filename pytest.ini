[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header

# Custom markers
markers =
    unit: fast tests with no DB (pure logic)
    integration: tests that hit the database
    auth: authentication flow tests

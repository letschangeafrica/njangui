# ── CD Pipeline ──────────────────────────────────────────────────────────────
# Runs ONLY on push to main AND only after CI passes.
# Deploys to Railway (or Render — see the commented alternative below).
#
# Setup required (one time):
#   Railway:
#     1. Create account at railway.app
#     2. New project → Deploy from GitHub repo
#     3. Add PostgreSQL and Redis services in Railway dashboard
#     4. Go to GitHub repo → Settings → Secrets → Actions
#     5. Add secret: RAILWAY_TOKEN  (from Railway dashboard → Account → Tokens)
#
#   Render (alternative):
#     1. Create account at render.com
#     2. New Web Service → connect GitHub repo
#     3. Add secret: RENDER_SERVICE_ID and RENDER_API_KEY

name: Deploy

on:
  push:
    branches: [main]   # only deploy from main

# Prevent multiple deployments running at the same time
concurrency:
  group: deploy-production
  cancel-in-progress: false    # don't cancel an in-progress deploy

jobs:
  # ── Gate: CI must pass first ──────────────────────────────────────────────
  # This job waits for the CI workflow to succeed before deploying.
  # It reads the CI result from the same commit SHA.
  ci-gate:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              check_name: 'Lint & Test',
            });
            const latest = checks.check_runs?.[0];
            if (!latest || latest.conclusion !== 'success') {
              core.setFailed('CI did not pass. Deployment blocked.');
            }

  # ── Deploy to Railway ─────────────────────────────────────────────────────
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: ci-gate
    environment: production    # enables GitHub environment protection rules

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --detach
        # --detach: don't wait for the deploy to finish (Railway handles it)
        # Railway automatically runs: alembic upgrade head && uvicorn ...
        # (from the CMD in your Dockerfile)

  # ─────────────────────────────────────────────────────────────────────────
  # ALTERNATIVE: Deploy to Render
  # Uncomment this block and comment out deploy-railway if you use Render.
  # ─────────────────────────────────────────────────────────────────────────
  # deploy-render:
  #   name: Deploy to Render
  #   runs-on: ubuntu-latest
  #   needs: ci-gate
  #   environment: production
  #   steps:
  #     - name: Trigger Render deploy
  #       run: |
  #         curl -X POST \
  #           "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
  #           -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
  #           -H "Content-Type: application/json" \
  #           -d '{"clearCache": false}'

  # ── Notify on success ─────────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy-railway
    if: always()
    steps:
      - name: Deployment summary
        run: |
          if [ "${{ needs.deploy-railway.result }}" == "success" ]; then
            echo "✅ Njangui deployed successfully to production."
          else
            echo "❌ Deployment failed. Check the logs above."
            exit 1
          fi
